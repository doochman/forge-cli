name: finance
domain: finance
description: Expert in financial data products, regulatory compliance, and risk analytics

questions:
  - key: product_type
    question: What type of financial product are you building?
    type: choice
    required: true
    choices:
      - label: Risk Analytics
        value: risk_analytics
        aliases: ["risk", "market risk", "risk scoring"]
      - label: Trading Platform
        value: trading_platform
        aliases: ["trading", "trades", "execution"]
      - label: Fraud Detection
        value: fraud_detection
        aliases: ["fraud", "fraud analytics", "fraud monitoring"]
      - label: Customer Analytics
        value: customer_analytics
        aliases: ["customer", "customer insights", "customer 360"]
      - label: Compliance Reporting
        value: compliance_reporting
        aliases: ["compliance", "regulatory reporting", "sox reporting"]
  - key: data_sources
    question: What data sources will you use?
    type: text
    required: true
    default: Transaction data, customer profiles, market data
  - key: compliance_requirements
    question: Any specific compliance requirements?
    type: choice
    required: false
    choices:
      - label: SOX
        value: sox
        aliases: ["sarbanes oxley"]
      - label: GDPR
        value: gdpr
        aliases: ["privacy"]
      - label: PCI DSS
        value: pci_dss
        aliases: ["pci", "card compliance"]
      - label: Basel III
        value: basel_iii
        aliases: ["basel"]
      - label: MiFID II
        value: mifid_ii
        aliases: ["mifid"]
      - label: None / not sure
        value: none
        aliases: ["none", "not sure", "no compliance"]
  - key: real_time
    question: Do you need real-time processing?
    type: choice
    default: "no"
    choices:
      - label: "Yes"
        value: "yes"
        aliases: ["y", "yeah", "yep", "sure", "real time"]
      - label: "No"
        value: "no"
        aliases: ["n", "nope", "batch", "not really"]

resolver_defaults:
  product_type: customer_analytics
  compliance_requirements: none
  real_time: "no"

suggestion_defaults:
  recommended_template: analytics-template
  recommended_provider: gcp
  recommended_patterns: []
  architecture_suggestions:
    - Use medallion architecture (bronze/silver/gold)
    - Implement data validation at ingestion
    - Set up monitoring and alerting
    - Consider data mesh for multiple teams
  best_practices:
    - Implement data lineage tracking
    - Use version control for all models and code
    - Set up automated testing for data quality
    - Implement disaster recovery procedures
    - Document data governance policies
  technology_stack: []
  security_requirements: []

rules:
  - when:
      all:
        - field: product_type
          equals: risk_analytics
    actions:
      - op: set
        path: recommended_template
        value: risk-analytics-template
      - op: append_unique
        path: recommended_patterns
        value: ["monte_carlo", "stress_testing"]
      - op: append_unique
        path: technology_stack
        value: ["Python", "pandas", "numpy", "scikit-learn"]
  - when:
      all:
        - field: product_type
          equals: trading_platform
    actions:
      - op: set
        path: recommended_template
        value: trading-platform-template
      - op: append_unique
        path: recommended_patterns
        value: ["event_sourcing", "cqrs"]
      - op: append_unique
        path: technology_stack
        value: ["Python", "Redis", "Kafka"]
  - when:
      all:
        - field: product_type
          equals: fraud_detection
    actions:
      - op: set
        path: recommended_template
        value: ml-pipeline-template
      - op: append_unique
        path: recommended_patterns
        value: ["anomaly_detection", "real_time_scoring"]
      - op: append_unique
        path: technology_stack
        value: ["Python", "TensorFlow", "Kafka"]
  - when:
      all:
        - field: real_time
          equals: "yes"
    actions:
      - op: append_unique
        path: recommended_patterns
        value: streaming_pipeline
      - op: append_unique
        path: technology_stack
        value: ["Apache Kafka", "Apache Flink"]
      - op: append_unique
        path: architecture_suggestions
        value: Implement stream processing with Kafka
  - when:
      all:
        - field: compliance_requirements
          in: ["sox", "gdpr", "pci_dss", "basel_iii", "mifid_ii"]
    actions:
      - op: append_unique
        path: security_requirements
        value:
          - Implement data encryption at rest and in transit
          - Set up audit logging for all data access
          - Implement role-based access control (RBAC)
          - Enable data retention policies
          - Set up compliance reporting dashboards
  - when:
      all:
        - field: compliance_requirements
          equals: sox
    actions:
      - op: append_unique
        path: security_requirements
        value: Implement SOX-compliant audit trails
  - when:
      all:
        - field: compliance_requirements
          equals: gdpr
    actions:
      - op: append_unique
        path: security_requirements
        value:
          - Implement right-to-be-forgotten workflows
          - Enable data portability
          - Set up consent management
  - when:
      all:
        - field: compliance_requirements
          equals: pci_dss
    actions:
      - op: append_unique
        path: security_requirements
        value:
          - Tokenize credit card data
          - Implement network segmentation
          - Regular security scans

next_step_tips: []

conditional_next_step_tips:
  - when:
      all:
        - field: compliance_requirements
          in: ["sox", "gdpr", "pci_dss", "basel_iii", "mifid_ii"]
    tips:
      - Review security and compliance requirements
      - Set up audit logging and access controls
