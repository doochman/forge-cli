name: retail
domain: retail
description: Expert in retail analytics, customer personalization, and inventory optimization

questions:
  - key: product_type
    question: What type of retail product are you building?
    type: choice
    required: true
    choices:
      - label: Customer 360
        value: customer_360
        aliases: ["customer 360", "cdp", "customer profile"]
      - label: Recommendation Engine
        value: recommendation_engine
        aliases: ["recommendations", "rec engine", "personalization"]
      - label: Inventory Optimization
        value: inventory_optimization
        aliases: ["inventory", "stock optimization", "replenishment"]
      - label: Price Optimization
        value: price_optimization
        aliases: ["pricing", "price"]
      - label: Demand Forecasting
        value: demand_forecasting
        aliases: ["forecasting", "demand"]
  - key: data_sources
    question: What data sources will you use?
    type: text
    required: true
    default: Transaction data, customer profiles, inventory data
  - key: real_time_personalization
    question: Do you need real-time personalization?
    type: choice
    default: "yes"
    choices:
      - label: "Yes"
        value: "yes"
        aliases: ["y", "yeah", "yep", "sure", "real time"]
      - label: "No"
        value: "no"
        aliases: ["n", "nope", "batch", "not really"]
  - key: scale
    question: Expected data scale?
    type: choice
    required: true
    choices:
      - label: Small (<1M records)
        value: small (<1m records)
        aliases: ["small", "<1m", "under 1m"]
      - label: Medium (1M-100M)
        value: medium (1m-100m)
        aliases: ["medium", "mid", "1m to 100m", "10m"]
      - label: Large (>100M)
        value: large (>100m)
        aliases: ["large", "huge", "100m+", "enterprise scale"]

resolver_defaults:
  product_type: customer_360
  real_time_personalization: "yes"
  scale: medium (1m-100m)

suggestion_defaults:
  recommended_template: analytics-template
  recommended_provider: gcp
  recommended_patterns: []
  architecture_suggestions:
    - Use event-driven architecture for transactions
    - Implement CDC (Change Data Capture)
    - Set up data marts for business teams
    - Consider customer data platform (CDP) patterns
  best_practices:
    - Implement customer privacy controls
    - Set up experimentation framework
    - Track customer journey metrics
    - Implement data quality monitoring
    - Set up business metrics dashboards
  technology_stack: []
  performance_optimization: []

rules:
  - when:
      all:
        - field: product_type
          equals: recommendation_engine
    actions:
      - op: set
        path: recommended_template
        value: ml-pipeline-template
      - op: append_unique
        path: recommended_patterns
        value: ["collaborative_filtering", "content_based"]
      - op: append_unique
        path: technology_stack
        value: ["Python", "TensorFlow", "Redis"]
  - when:
      all:
        - field: product_type
          equals: inventory_optimization
    actions:
      - op: set
        path: recommended_template
        value: optimization-template
      - op: append_unique
        path: recommended_patterns
        value: demand_forecasting
      - op: append_unique
        path: technology_stack
        value: ["Python", "OR-Tools", "Prophet"]
  - when:
      all:
        - field: product_type
          equals: customer_360
    actions:
      - op: set
        path: recommended_template
        value: customer360-template
      - op: append_unique
        path: recommended_patterns
        value: customer_segmentation
  - when:
      all:
        - field: real_time_personalization
          equals: "yes"
    actions:
      - op: append_unique
        path: recommended_patterns
        value: streaming_pipeline
      - op: append_unique
        path: technology_stack
        value: ["Redis", "Kafka"]
      - op: append_unique
        path: architecture_suggestions
        value:
          - Implement feature store for real-time serving
          - Use caching layer for frequently accessed data
          - Set up A/B testing framework
  - when:
      all:
        - field: scale
          equals: large (>100m)
    actions:
      - op: set
        path: recommended_provider
        value: gcp
      - op: append_unique
        path: performance_optimization
        value:
          - Use partitioning for large tables
          - Implement incremental processing
          - Consider distributed processing (Spark)
          - Set up data lake architecture
          - Use columnar storage (Parquet)
  - when:
      all:
        - field: scale
          equals: small (<1m records)
    actions:
      - op: set
        path: recommended_provider
        value: local
      - op: append_unique
        path: performance_optimization
        value: PostgreSQL sufficient for this scale

next_step_tips:
  - Configure personalization engine settings
  - Set up A/B testing framework
